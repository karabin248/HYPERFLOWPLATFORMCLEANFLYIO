openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.3.0
  description: Hyperflow Agent Platform API specification
servers:
  - url: /api
    description: Base API path
security:
  - bearerAuth: []
tags:
  - name: health
    description: Health operations
  - name: agents
    description: Agent catalog management
  - name: agent-runs
    description: Agent execution and run management

paths:
  /livez:
    get:
      security: []
      operationId: liveCheck
      tags: [health]
      summary: Liveness check
      description: Returns minimal public liveness status
      responses:
        "200":
          description: Alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /readyz:
    get:
      operationId: readinessCheck
      tags: [health]
      summary: Readiness check
      description: Returns authenticated dependency readiness status
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Not ready

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Detailed health check
      description: Returns authenticated detailed server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Degraded

  /metrics:
    get:
      operationId: metricsScrape
      tags: [health]
      summary: Prometheus metrics
      description: Returns authenticated Prometheus metrics text output
      responses:
        "200":
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List agents
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, disabled, deprecated]
        - name: role
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
                  total:
                    type: integer
                required: [agents, total]
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create a new agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentPayload"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "409":
          description: Agent already exists

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update agent (creates revision)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentPayload"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Validation error
        "404":
          description: Agent not found

  /agents/{id}/disable:
    post:
      operationId: disableAgent
      tags: [agents]
      summary: Disable an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
        "409":
          description: Agent already disabled

  /agents/{id}/enable:
    post:
      operationId: enableAgent
      tags: [agents]
      summary: Enable an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
        "409":
          description: Agent already active

  /agents/{id}/revisions:
    get:
      operationId: getRevisions
      tags: [agents]
      summary: Get agent revision history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revision list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agentId:
                    type: string
                  revisions:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentRevision"
                  total:
                    type: integer
                required: [agentId, revisions, total]
        "404":
          description: Agent not found

  /agents/seed:
    post:
      operationId: seedAgents
      tags: [agents]
      summary: Seed default agents
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                type: object
                properties:
                  seeded:
                    type: integer
                  skipped:
                    type: integer

  /agents/run:
    post:
      operationId: runAgent
      tags: [agent-runs]
      summary: Execute an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRunRequest"
      responses:
        "200":
          description: Run completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "404":
          description: Agent not found
        "409":
          description: Agent not active

  /agent-runs:
    get:
      operationId: listRuns
      tags: [agent-runs]
      summary: List agent runs
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: agentVersion
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, running, completed, failed, cancelled]
        - name: requestedBy
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: hasError
          in: query
          schema:
            type: string
            enum: ["true"]
        - name: minQualityScore
          in: query
          schema:
            type: number
        - name: retryOf
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentRun"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                required: [runs, total, limit, offset]

  /agent-runs/metrics:
    get:
      operationId: getMetrics
      tags: [agent-runs]
      summary: Aggregate run metrics
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunMetrics"

  /agent-runs/{id}:
    get:
      operationId: getRun
      tags: [agent-runs]
      summary: Get run detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"
        "404":
          description: Run not found

  /agent-runs/{id}/retry:
    post:
      operationId: retryRun
      tags: [agent-runs]
      summary: Retry a failed run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Retry result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryResponse"
        "404":
          description: Run not found
        "409":
          description: Run not retryable

  /agent-runs/{id}/resume:
    post:
      operationId: resumeRun
      tags: [agent-runs]
      summary: Resume a run (not supported)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "405":
          description: Resume not supported
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  supportedActions:
                    type: array
                    items:
                      type: string

  /agent-runs/{id}/cancel:
    post:
      operationId: cancelRun
      tags: [agent-runs]
      summary: Cancel a queued or running run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  cancelledAt:
                    type: string
                    format: date-time
                required: [id, status, cancelledAt]
        "404":
          description: Run not found
        "409":
          description: Invalid state transition

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: >
        API token passed as `Authorization: Bearer <token>`. Required on
        protected endpoints when HARDENED_MODE=true. Development mode may
        bypass auth depending on server configuration.
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, disabled, deprecated]
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        inputSchema:
          type: object
        outputSchema:
          type: object
        runtimeMode:
          type: string
        executionPolicy:
          type: object
        promptTemplate:
          type: string
        tags:
          type: array
          items:
            type: string
        owner:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, version, status, role, capabilities, runtimeMode, promptTemplate, tags, createdAt, updatedAt]

    CreateAgentPayload:
      type: object
      properties:
        id:
          type: string
          minLength: 3
          maxLength: 64
          pattern: "^[a-z0-9][a-z0-9\\-]{2,63}$"
        name:
          type: string
          minLength: 1
          maxLength: 128
        version:
          type: string
          pattern: "^\\d+\\.\\d+\\.\\d+$"
        description:
          type: string
          maxLength: 2048
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        promptTemplate:
          type: string
        tags:
          type: array
          items:
            type: string
        runtimeMode:
          type: string
          enum: [standard, fast, careful, creative]
        executionPolicy:
          type: object
        inputSchema:
          type: object
        outputSchema:
          type: object
      required: [id, name, version]

    UpdateAgentPayload:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        description:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        promptTemplate:
          type: string
        tags:
          type: array
          items:
            type: string
        runtimeMode:
          type: string
        executionPolicy:
          type: object
        inputSchema:
          type: object
        outputSchema:
          type: object
        owner:
          type: string
          nullable: true

    AgentRevision:
      type: object
      properties:
        id:
          type: integer
        agentId:
          type: string
        revisionNumber:
          type: integer
        spec:
          type: object
        changedFields:
          type: array
          items:
            type: string
        changedBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, agentId, revisionNumber, spec, changedFields, changedBy, createdAt]

    NormalizedOutput:
      type: object
      properties:
        summary:
          type: string
        structured:
          type: object
        artifacts:
          type: array
          items:
            type: string
        qualityScore:
          type: number
          nullable: true
        warnings:
          type: array
          items:
            type: string
        nextSuggestedAction:
          type: string
          nullable: true
      required: [summary, structured, artifacts, warnings]

    CanonicalTrace:
      type: object
      properties:
        canonical_combo:
          type: string
        canonical_phases:
          type: array
          items:
            type: string
        phases_completed:
          type: array
          items:
            type: string
        terminal_phase:
          type: string
        order_preserved:
          type: boolean
        cycle_version:
          type: string
        mps_level:
          type: integer
        mps_name:
          type: string
        canonical_combo_detected:
          type: boolean

    AgentRun:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        agentVersion:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        input:
          type: object
        output:
          type: object
          nullable: true
        normalizedOutput:
          $ref: "#/components/schemas/NormalizedOutput"
        error:
          type: string
          nullable: true
        runtimeRunId:
          type: string
          nullable: true
        canonicalTrace:
          $ref: "#/components/schemas/CanonicalTrace"
        qualityScore:
          type: number
          nullable: true
        parentRunId:
          type: string
          nullable: true
        originRunId:
          type: string
          nullable: true
        retryCount:
          type: integer
        retryReason:
          type: string
          nullable: true
        requestedBy:
          type: string
          nullable: true
        queuedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        failedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        durationMs:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        retryChain:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              status:
                type: string
              parentRunId:
                type: string
                nullable: true
              createdAt:
                type: string
                format: date-time
            required: [id, status, createdAt]
      required: [id, agentId, agentVersion, status, input, createdAt]

    AgentRunRequest:
      type: object
      properties:
        agentId:
          type: string
        input:
          type: object
        requestedBy:
          type: string
          default: operator
        correlationId:
          type: string
        runPolicy:
          type: object
      required: [agentId]

    RunResponse:
      type: object
      properties:
        runId:
          type: string
        agentId:
          type: string
        status:
          type: string
        output:
          type: object
          nullable: true
        normalizedOutput:
          $ref: "#/components/schemas/NormalizedOutput"
        qualityScore:
          type: number
          nullable: true
        intent:
          type: string
          nullable: true
        mode:
          type: string
          nullable: true
        canonicalCombo:
          type: string
          nullable: true
        canonicalPhases:
          type: array
          items:
            type: string
          nullable: true
        canonicalTrace:
          $ref: "#/components/schemas/CanonicalTrace"
        durationMs:
          type: integer
      required: [runId, agentId, status]

    RetryResponse:
      type: object
      properties:
        originalRunId:
          type: string
        retryRunId:
          type: string
        originRunId:
          type: string
        retryCount:
          type: integer
        status:
          type: string
        output:
          type: object
          nullable: true
        normalizedOutput:
          $ref: "#/components/schemas/NormalizedOutput"
        canonicalTrace:
          $ref: "#/components/schemas/CanonicalTrace"
      required: [originalRunId, retryRunId, originRunId, retryCount, status]

    RunMetrics:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        cancelled:
          type: integer
        retried:
          type: integer
        avgDurationMs:
          type: integer
          nullable: true
        avgQualityScore:
          type: number
          nullable: true
      required: [total, completed, failed, cancelled, retried]

    ValidationError:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
            required: [field, message]
      required: [error, details]
