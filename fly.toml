app = "hyperflow-api"
primary_region = "ams"

[build]
  dockerfile = "artifacts/api-server/Dockerfile"

[env]
  HARDENED_MODE = "true"
  HYPERFLOW_CORE_URL = "http://hyperflow-core.internal:8000"
  NODE_ENV = "production"
  PORT = "8080"
  TRUST_PROXY = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 300
    soft_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/healthz"
    protocol = "http"
